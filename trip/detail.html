.room.bed.tag\":\"%1$s: %2$s\",\"key.hotel.filter.showmore\":\"Show More\",\"key.hotel.filter.showless\":\"Show Less\",\"resx.onlineflightresource.hotel_online_pay_total\":\"Prepay online\",\"key.bundles.detail.ori.price.new\":\"Booked separately\",\"key.bundle.booking.price.bundle.save\":\"Flight + Hotel discount\",\"key.bundles.hotel.tax.policy.layer.title\":\"Pay at Hotel\",\"key.hotel.list.tax.total.fee\":\"Total\",\"key.bundle.room.layer.saving.incentives\":\"Your total savings with this bundle:\",\"key.bundle.booking.per.traveler\":\"%1$s per traveler\",\"key.bundle.booking.traveler\":\"%1$s Traveler\",\"key.flight.searchForm.passengerCountI18n.adult\":\"{0} adult\",\"key.flight.searchForm.passengerCountI18n.child\":\"{0} child\",\"key.flight.searchForm.passengerCountI18n.infant\":\"{0} infant\",\"key.addOnsI18n.commaI18n\":\", \",\"key.booking.commonI18n.bracketsI18n\":\"(%1$s)\",\"key.bundle.hotel.list.per.person.price\":\"per traveler\",\"key.flight.hotel.due.at.hotel.title\":\"Due at Hotel\",\"key.bundle.ticketcard.select\":\"Select\",\"key.bundles.detail.current.price.new\":\"Flight + Hotel\",\"key.bundles.detail.new.bundle\":\"Flight + hotel per person\",\"key.bundle.hotelcard.hotel.taxes\":\"Taxes \u0026 fees due at hotel: %1$s\",\"key.bundle.hotel.incl.taxfee\":\"Incl. taxes \u0026 fees\",\"key.hotel.detail.page.album.facility.additional.charge\":\"Additional charge\",\"key.hotel.detail.page.album.facility.free\":\"Free\",\"key.hotel.detail.page.children.and.bed\":\"Cribs and Extra Beds\",\"key.hotel.detail.roomlayer.error\":\"Oops, something went wrong\",\"key.hotel.detail.roomlayer.retry\":\"Try Again\",\"resx.onlinehotelresource.v3_hotels_backtoalbum\":\"Back to Album\",\"key.hotel.room.pop.up.select.room\":\"Select Room\",\"key.88801001.hotel.detailedpage.listprice1.label\":\"Original price %1$s\",\"key.88801001.hotel.detailedpage.listprice2.label\":\"Current price %1$s\",\"key.88801001.hotel.detailedpage.moreinfo.button\":\"More info\",\"key.88801001.hotel.detailedpage.album.button\":\"Photo gallery for %1$s\",\"key.88801001.hotel.wpm.tcs.title1\":\"Can I submit a price match request?\",\"key.88801001.hotel.wpm.tcs.para1\":\"At Trip.com, our goal is to provide our users with the best possible room rates. If a lower price for the same room type and the same dates is bookable on any Applicable Platform (as defined below), you may submit a request for a refund of the difference in Trip Coins. If your request meets the specified criteria and is approved, we'll send the approved refund in Trip Coins to your Trip.com account.\",\"key.88801001.hotel.wpm.tcs.title2\":\"How to send a request\",\"key.88801001.hotel.wpm.tcs.step1\":\"Book a stay on Trip.com\",\"key.88801001.hotel.wpm.tcs.step2\":\"Find a lower price on an Applicable Platform\",\"key.88801001.hotel.wpm.tcs.step3\":\"Submit a price match request\",\"key.88801001.hotel.wpm.tcs.step3.detail\":\"Submit a request that includes proof of the price difference by midnight (11:59 PM, property's local time) the day before your check-in date\",\"key.88801001.hotel.wpm.tcs.step4\":\"Await approval\",\"key.88801001.hotel.wpm.tcs.step4.detail\":\"We'll review your request and let you know if we've approved it within 24 hours of submission\",\"key.88801001.hotel.wpm.tcs.step5\":\"Receive refund\",\"key.88801001.hotel.wpm.tcs.step5.detail\":\"After approval, your Trip.com account will be credited the amount in the form of Trip Coins within 1 working day after you complete your stay. No refunds will be issued for canceled bookings.\",\"key.88801001.hotel.wpm.tcs.title4\":\"Can I submit a price match request?\",\"key.88801001.hotel.wpm.tcs.conditon1\":\"Room type match\",\"key.88801001.hotel.wpm.tcs.conditon1.detail\":\"The room type on the Applicable Platform must match your booking. It must be the same room type at the same property, with the same facilities, room size, breakfast policy, cancellation policy, number of guests, payment method, and any other applicable details.\",\"key.88801001.hotel.wpm.tcs.conditon2\":\"Booking consistency\",\"key.88801001.hotel.wpm.tcs.conditon2.detail\":\"Your stay dates entered in your request must exactly match your booking on Trip.com. Your payment method and the language you used to book must also be the same.\",\"key.88801001.hotel.wpm.tcs.conditon3\":\"Price requirements\",\"key.88801001.hotel.wpm.tcs.conditon3.detail1\":\"The lower price found on the Applicable Platform must be available to all users. It can't be a price with restrictions, limitations, or promotions (including but not limited to the use of vouchers, promo codes, loyalty point reward programs, credit card promotions, and any other method which reduces the original price shown on the Applicable  Platform).\",\"key.88801001.hotel.wpm.tcs.conditon3.detail2\":\"The lower price on the Applicable Platform must be able to be booked individually. It can't be booked as part of a package, such as a tour or a flight and hotel package.\",\"key.88801001.hotel.wpm.tcs.title5\":\"Why can't I submit a price match request?\",\"key.88801001.hotel.wpm.tcs.unmatch1\":\"Your booking isn't confirmed or has been canceled\",\"key.88801001.hotel.wpm.tcs.unmatch1.detail\":\"Price match requests can't be submitted for bookings that haven't been confirmed yet or have been canceled\",\"key.88801001.hotel.wpm.tcs.unmatch2\":\"Your booking type isn't eligible\",\"key.88801001.key.88801001.hotel.wpm.tcs.unmatch2.edit\":\"The following booking types aren't eligible for a price match request:\",\"key.88801001.key.88801001.hotel.wpm.tcs.unmatch2.edit1\":\"Bookings you've received additional Trip Coins for\",\"key.88801001.key.88801001.hotel.wpm.tcs.unmatch2.edit2\":\"Bookings that are part of the PointPLUS program\",\"key.88801001.key.88801001.hotel.wpm.tcs.unmatch2.edit3\":\"Bookings that weren't made individually on the Applicable Platform or Trip.com, such as an add-on package or flight-and-hotel package\",\"key.88801001.hotel.wpm.tcs.unmatch3\":\"Platform not eligible\",\"key.88801001.hotel.wpm.tcs.unmatch3.detail\":\"You can only submit price match requests for prices found on the property's official website and Applicable Platforms. The term \\\"Applicable Platform\\\" refers to: %1$s.\",\"key.88801001.hotel.wpm.tcs.title6\":\"Important notices\",\"key.88801001.hotel.wpm.tcs.sum1\":\"After you submit a request that meets all requirements and upload proof, we will review the price. If there is a discrepancy between the price you found and the price we find during verification, the current price at the time of verification will apply. After submitting your request, we'll get back to you with the results within 24 hours.\",\"key.88801001.hotel.wpm.tcs.sum2\":\"The maximum refundable price difference is USD1,500 per booking. For bookings in other currencies, the equivalent amount is calculated using the exchange rate at the time of your request.\",\"key.88801001.hotel.wpm.tcs.sum3\":\"The currency used for price comparison depends on your payment method. If you pay online, we'll compare the prices in the currency used at that time. If you pay at the property, we'll compare the prices in the property's local currency.\",\"key.88801001.hotel.wpm.tcs.sum4\":\"In cases where promo codes have been applied to a Trip.com property booking, the discounted price (including tax) will be used for price comparison purposes\",\"key.88801001.hotel.wpm.tcs.sum5\":\"If you modify your booking after submitting the price match request (including but not limited to changes to the property name, room type, stay dates, or number of guests), your request will be considered invalid\",\"key.88801001.hotel.wpm.tcs.sum6\":\"When submitting price match requests, you can only receive one refund per booking. If multiple requests are approved, you’ll receive a refund for the largest price difference.\",\"key.88801001.hotel.wpm.tcs.sum7\":\"Please don't submit multiple requests for the same booking too frequently. We reserve the right to limit or reject requests if they appear excessive.\",\"key.88801001.hotel.wpm.tcs.sum8\":\"If price match is used in an illegal, fraudulent, abusive, or otherwise improper manner, we reserve the right to restrict requests or deny refunds\",\"key.88801001.hotel.wpm.tcs.sum9\":\"Price match is currently in trial phase and is only available in certain languages and regions\",\"key.88801001.hotel.wpm.tcs.sum10\":\"We reserve the right, at our sole discretion, to determine whether a booking qualifies for the price match. This decision may be based on factors including compliance with booking consistency requirements and whether the price match request meets all applicable terms and conditions (for example, our general Terms \u0026 Conditions).\",\"key.88801001.hotel.wpm.tcs.sum11\":\"The issuance, use, and validity of Trip Coins are subject to our Trip.com Rewards Program Terms and Conditions\",\"key.88801001.hotel.wpm.tcs.sum12\":\"Where the original English version of these terms has been translated into other languages, the English version shall prevail in the event of any inconsistences between the versions\",\"key.hotel.userbenefits.floating.promo.code.detail\":\"View Details\",\"key.hotel.userbenefits.banner.crossselluser.claimed\":\"Active\",\"key.hotel.userbenefits.banner.crossselluser.claimed.unlock\":\"Sign In and Unlock Them All\",\"key.hotel.userbenefits.floating.crossselluser.claimed.unlock\":\"Unlock all rewards in just 1 minute\",\"key.88801001.hotel.userbenefits.cta.book.now\":\"Book now\",\"book_promo_code\":\"Promo Code\",\"key.88801001.hotel.online.listpage.enterpromocode.error\":\"We couldn't find this promo code. Try double-checking the spelling.\",\"key.88801001.hotel.online.listpage.enterpromocode\":\"Use your promo code\",\"book_apply_coupon\":\"Use\",\"key.88801001.hotel.rewardspage.property.instructions\":\"How it works\",\"key.88801001.hotel.rewardspage.coupon.use.multinight\":\"To use this promo code, search for stays of %1$s nights or more\",\"common_got_it\":\"Got It\",\"common_sure\":\"OK\",\"key.hotel.brg.all.content\":\"At Trip.com, our goal is to provide our users with the best possible room rates. If you find a lower price for the same room type and the same dates on another platform, you can request for us to refund the difference. Once your request has been approved, we'll send you the refund in Trip Coins.\",\"key.hotel.brg.terms.howto.title\":\"Submit your claim\",\"key.hotel.brg.terms.howto.time\":\"Please submit your claim before 12:00 noon (hotel's local time) the day before your check-in date by selecting \\\"We Price Match\\\" on the Trip.com booking details page.\",\"key.hotel.brg.terms.howto.info\":\"Please follow the instructions on Trip.com to provide price-related details, screenshots, and web address where you found the cheaper price.\",\"key.hotel.brg.terms.howto.attention\":\"Notes: \",\"key.hotel.brg.terms.howto.attention1\":\"Claims can only be made for confirmed bookings that have not been canceled. Please note that the Trip.com Price Match claim submission entrance will not display if claims cannot be made for your booking.\",\"key.hotel.brg.terms.howto.attention2\":\"Please ensure that the web address you provide will still be valid at the time it is checked, and that the cheaper price you submit will still be available to book at that time.\",\"key.hotel.brg.terms.howto.attention3\":\"Please provide screenshots of the platform where you found the cheaper price. These screenshots should clearly show the hotel name, room type, check-in and check-out dates, the room price, and any other details related to your claim.\",\"key.hotel.brg.terms.standard.title\":\"Review Criteria\",\"key.hotel.brg.terms.standard.same.room\":\"Room Type Match\",\"key.hotel.brg.terms.standard.same.room1\":\"The room type for your Trip.com Match Price Guarantee claim must match the room type in your booking. The room type must also be at the same hotel, and the following details must also be the same: whether breakfast is included, bed type, whether Wi-Fi is provided, room size, payment method, number of guests, change and cancellation policy, booking terms and conditions, deposit policy (if applicable), free gifts included, and any other applicable room details.\",\"key.hotel.brg.terms.standard.same.book\":\"Booking Match\",\"key.hotel.brg.terms.standard.same.book1\":\"The check-in and check-out dates for your Trip.com Price Match Guarantee claim must match the check-in and check-out dates of your booking. The device you use to book, the selected currency, and the selected language must also be the same.\",\"key.hotel.brg.terms.inapplicable.price\":\"Price Requirements\",\"key.hotel.brg.terms.inapplicable.price1\":\"The lower price you found must be available to all users; restricted or member-only prices are not eligible.\",\"key.hotel.brg.terms.inapplicable.price2\":\"The lower price you found cannot be the price after promo codes or any other website promotions have been applied.\",\"key.hotel.brg.terms.inapplicable.price3\":\"The lower price you found must be available to book independently. It cannot be a price which is only available when booked with other products, such as part of a tour group, or as part of a flight + hotel package booking.\",\"key.hotel.brg.terms.inapplicable.book\":\"Booking Requirements\",\"key.hotel.brg.terms.inapplicable.book1\":\"Not applicable to room types offering additional Trip Coins rewards.\",\"key.hotel.brg.terms.inapplicable.book2\":\"Not applicable to bookings which are part of the PointsPlus program.\",\"key.hotel.brg.terms.comparison.range\":\"Applicable Prices\",\"key.hotel.brg.terms.comparison.range1\":\"The Trip.com Price Match Guarantee is applicable to prices displayed on hotel official websites and the following hotel booking websites: Agoda, Booking.com, Expedia, Hotels.com, KAYAK, lastminute.com, Orbitz, and Priceline. If the lower price you found is not available on one of these websites, the Trip.com Price Match Guarantee will not apply.\",\"key.hotel.brg.terms.attention.title\":\"Important Notes\",\"key.hotel.brg.terms.attention.content1\":\"The maximum price difference that can be refunded is US$1,500 or the equivalent amount in other currencies (the exchange rate at the time you submitted your claim will apply).\",\"key.hotel.brg.terms.attention.content2\":\"The currency we use when comparing prices will depend on the payment method. For bookings that are prepaid online, we will use the currency the prepayment is made in for price comparison. For bookings that are paid at the hotel, we will use the local currency at the hotel's location for price comparison.\",\"key.hotel.brg.terms.attention.content3\":\"If you applied promo codes to your Trip.com hotel booking, we will use the Trip.com price (including tax) after any promo codes were applied to compare prices.\",\"key.hotel.brg.terms.attention.content4\":\"Only one Price Match Guarantee claim can be approved per booking.\",\"key.hotel.brg.terms.attention.content5\":\"If you submit a booking change request after your price difference claim is approved by Trip.com, you will not be able to receive the price difference refund.\",\"key.hotel.brg.terms.attention.content6\":\"The Trip.com Price Match Guarantee is currently in the trial stage, and is only available on some of the Trip.com language websites. We apologize for any inconvenience caused.\",\"key.hotel.brg.terms.attention.content7\":\"Trip.com reserves the right to exercise its discretion regarding whether the Trip.com Price Match Guarantee is applicable. This includes, but is not limited to, deciding whether or not the lower price matches the Trip.com booking in terms of hotel, room type, dates of stay, and whether or not the price difference claim meets all applicable terms and conditions.\",\"detail_policy\":\"Property Policies\",\"resx.onlinehotelresource.labeltext_hotel_hoteldescription_v3\":\"Property Description\",\"key.hotel.detail.tips.title\":\"Fine Print\",\"key.
